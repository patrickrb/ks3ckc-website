<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KS3CKC — Redesign Concepts</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; background: #f0eee9; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" data-presets="react" src="design-canvas.jsx"></script>
  <script type="text/babel" data-presets="react" src="phosphor.jsx"></script>
  <script type="text/babel" data-presets="react" src="phosphor-dashboard.jsx"></script>
  <script type="text/babel" data-presets="react" src="console.jsx"></script>

  <script type="text/babel" data-presets="react">
    const App = () => (
      <DesignCanvas>
        <DCSection id="public-site" title="Public Site — Homepage" subtitle="Two directions, full-page mockups. Drag to reorder, double-click any artboard to focus.">
          <DCArtboard id="phos-home" label="A · Phosphor Terminal — full CRT, ASCII, scanlines" width={1280} height={3600}>
            <PhosphorPage />
          </DCArtboard>
          <DCArtboard id="con-home" label="B · Console / Blueprint — editorial dark + QSL + waveforms" width={1280} height={3600}>
            <ConsolePage />
          </DCArtboard>
        </DCSection>

        <DCSection id="dashboard" title="Member Dashboard" subtitle="Logged-in member view — quick freq reference (446.050 / 145.555 · 69.3 Hz tone), recent QSOs, propagation, roster.">
          <DCArtboard id="phos-dash" label="A · Phosphor Terminal — dashboard" width={1280} height={900}>
            <PhosDashboard />
          </DCArtboard>
          <DCArtboard id="con-dash" label="B · Console / Blueprint — dashboard" width={1280} height={900}>
            <ConDashboard />
          </DCArtboard>
        </DCSection>

        <DCPostIt x={40} y={20} rotate={-2}>
          KS3CKC redesign — 2 directions side by side. A leans hard into terminal/CRT (closer to /r/unixporn). B is editorial-modern with ham/QSL/blueprint flavor. Both have homepage + member dashboard. Mix & match welcome.
        </DCPostIt>
      </DesignCanvas>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
